<!DOCTYPE html>
<html>

<head>
  <title>Security Dashboard</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/security-dashboard.css">
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      color: #111827;
    }

    /* Header */

    .header {
      background: #000;
      color: white;
      padding: 25px 40px;
      font-size: 2rem;
      font-weight: 700;
      border-bottom: 4px solid #ff6b00;
    }

    /* Main Container */

    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
    }

    /* Cards */

    .card {
      background: white;
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      margin-bottom: 25px;
    }

    /* Scanner */

    #reader {
      width: 420px;
      max-width: 100%;
      margin: 25px auto;
      border-radius: 16px;
      overflow: hidden;
    }

    /* Button */

    #startScanner {
      background: #ff6b00;
      color: white;
      border: none;
      padding: 14px 30px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    #startScanner:hover {
      background: #e45f00;
      transform: translateY(-2px);
    }

    /* Result Box */

    #result {
      margin-top: 25px;
      padding: 25px;
      border-radius: 16px;
      background: #ffffff;
      border-left: 6px solid #ff6b00;
      font-size: 18px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
    }

    /* Success State */

    .success {
      color: #16a34a;
      font-weight: 700;
    }

    /* Visitor Name */

    .visitor-name {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    /* Status Badge */

    .badge {
      display: inline-block;
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      background: #dcfce7;
      color: #166534;
    }

    /* Dashboard Counters */

    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 25px;
    }

    .stat-card {
      flex: 1;
      background: white;
      border-radius: 18px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .stat-card h2 {
      color: #ff6b00;
      font-size: 36px;
      margin: 10px 0;
    }

    .stat-card p {
      color: #6b7280;
      margin: 0;
      font-weight: 600;
    }

    /* Modern Scanner Result Cards */
    .scan-result-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 24px;
      border-radius: 16px;
      margin-top: 20px;
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      border: 1px solid transparent;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      position: relative;
      overflow: hidden;
    }

    @keyframes popIn {
      0% {
        opacity: 0;
        transform: scale(0.9) translateY(10px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .scan-result-card.success-check-in {
      background: linear-gradient(135deg, #ecfdf5 0%, #f0fdf4 100%);
      border-color: #10b981;
      color: #065f46;
    }

    .scan-result-card.success-check-out {
      background: linear-gradient(135deg, #eff6ff 0%, #f0f7ff 100%);
      border-color: #3b82f6;
      color: #1e40af;
    }

    .scan-result-card.warning-error {
      background: linear-gradient(135deg, #fffbeb 0%, #fffbeb 100%);
      border-color: #f59e0b;
      color: #92400e;
    }

    .scan-result-card.error-danger {
      background: linear-gradient(135deg, #fef2f2 0%, #fef2f2 100%);
      border-color: #ef4444;
      color: #991b1b;
    }

    .scan-icon-container {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      background: white;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }

    .scan-icon-container svg {
      width: 32px;
      height: 32px;
    }

    .scan-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .scan-visitor-name {
      font-size: 18px;
      font-weight: 600;
      opacity: 0.9;
      margin-bottom: 8px;
    }

    .scan-meta {
      font-size: 13px;
      opacity: 0.7;
      margin-top: 4px;
    }

    .scan-result-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
    }
    .scan-result-card.success-check-in::before {
      background: #10b981;
    }
    .scan-result-card.success-check-out::before {
      background: #3b82f6;
    }
    .scan-result-card.warning-error::before {
      background: #f59e0b;
    }
    .scan-result-card.error-danger::before {
      background: #ef4444;
    }

    /* Toast Notification Container */
    #toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 380px;
      width: 100%;
      pointer-events: none;
    }

    .toast {
      pointer-events: auto;
      background: white;
      border-radius: 12px;
      padding: 16px 20px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      border-left: 6px solid #ff6b00;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      transform: translateX(120%);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
      opacity: 0;
    }

    .toast.show {
      transform: translateX(0);
      opacity: 1;
    }

    .toast-content {
      flex: 1;
    }

    .toast-title {
      font-size: 15px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast-message {
      font-size: 13px;
      color: #4b5563;
      line-height: 1.4;
    }

    .toast-close {
      background: transparent;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      line-height: 1;
      transition: color 0.2s;
    }

    .toast-close:hover {
      color: #374151;
    }
  </style>
</head>

<body>
  <div id="toast-container"></div>

  <div class="header" style="display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;">
    <span>Security Dashboard</span>
    <button onclick="logoutSecurity()" style="background: transparent; color: white; border: 2px solid white; padding: 8px 16px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.3s;">Logout</button>
  </div>

  <div class="container">
    <div class="stats">

      <div class="stat-card">
        <h2 id="waitingCount">0</h2>
        <p>Waiting Verification</p>
      </div>

      <div class="stat-card">
        <h2 id="employeeCount">0</h2>
        <p>Waiting Employee</p>
      </div>

      <div class="stat-card">
        <h2 id="approvedCount">0</h2>
        <p>Approved Today</p>
      </div>

      <div class="stat-card">
        <h2 id="checkedCount">0</h2>
        <p>Checked In</p>
      </div>

    </div>

    <div class="card">

      <h2>Pending Visitors</h2>

      <button id="refreshBtn" class="refresh-btn">🔄 Refresh</button>

      <input id="search" type="text" placeholder="Search visitor...">

      <div id="visitorList">

      </div>

    </div>
    <div class="card">
      <h2>QR Check-In / Check-Out</h2>

      <button id="startScanner">
        Start Scanner
      </button>

      <div id="reader"></div>

      <div id="result">
        Scan a visitor QR
      </div>
    </div>

  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/security-dashboard.js?v=2"></script>
</body>

</html>
