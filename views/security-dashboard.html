<!DOCTYPE html>
<html>

<head>
  <title>Security Dashboard</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/security-dashboard.css">
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      color: #111827;
    }

    /* Header */

    .header {
      background: #000;
      color: white;
      padding: 25px 40px;
      font-size: 2rem;
      font-weight: 700;
      border-bottom: 4px solid #ff6b00;
    }

    /* Main Container */

    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
    }

    /* Cards */

    .card {
      background: white;
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      margin-bottom: 25px;
    }

    /* Scanner */

    #reader {
      width: 420px;
      max-width: 100%;
      margin: 25px auto;
      border-radius: 16px;
      overflow: hidden;
    }

    /* Button */

    #startScanner {
      background: #ff6b00;
      color: white;
      border: none;
      padding: 14px 30px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    #startScanner:hover {
      background: #e45f00;
      transform: translateY(-2px);
    }

    /* Result Box */

    #result {
      margin-top: 25px;
      padding: 25px;
      border-radius: 16px;
      background: #ffffff;
      border-left: 6px solid #ff6b00;
      font-size: 18px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
    }

    /* Success State */

    .success {
      color: #16a34a;
      font-weight: 700;
    }

    /* Visitor Name */

    .visitor-name {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    /* Status Badge */

    .badge {
      display: inline-block;
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      background: #dcfce7;
      color: #166534;
    }

    /* Dashboard Counters */

    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 25px;
    }

    .stat-card {
      flex: 1;
      background: white;
      border-radius: 18px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .stat-card h2 {
      color: #ff6b00;
      font-size: 36px;
      margin: 10px 0;
    }

    .stat-card p {
      color: #6b7280;
      margin: 0;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <div class="header" style="display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;">
    <span>Security Dashboard</span>
    <button onclick="logoutSecurity()" style="background: transparent; color: white; border: 2px solid white; padding: 8px 16px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.3s;">Logout</button>
  </div>

  <div class="container">
    <div class="stats">

      <div class="stat-card">
        <h2 id="waitingCount">0</h2>
        <p>Waiting Verification</p>
      </div>

      <div class="stat-card">
        <h2 id="employeeCount">0</h2>
        <p>Waiting Employee</p>
      </div>

      <div class="stat-card">
        <h2 id="approvedCount">0</h2>
        <p>Approved Today</p>
      </div>

      <div class="stat-card">
        <h2 id="checkedCount">0</h2>
        <p>Checked In</p>
      </div>

    </div>

    <div class="card">

      <h2>Pending Visitors</h2>

      <button id="refreshBtn" class="refresh-btn">🔄 Refresh</button>

      <input id="search" type="text" placeholder="Search visitor...">

      <div id="visitorList">

      </div>

    </div>
    <div class="card">
      <h2>QR Check-In / Check-Out</h2>

      <button id="startScanner">
        Start Scanner
      </button>

      <div id="reader"></div>

      <div id="result">
        Scan a visitor QR
      </div>
    </div>

  </div>
  <script src="/security-dashboard.js"></script>
</body>

</html>
