<!DOCTYPE html>
<html>

<head>
    <title>Visitor Logs</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --surface: #ffffff;
            --surface-alt: #f8f9fb;
            --bg: #eef2f7;
            --primary: #c62828;
            --primary-dark: #a91e1e;
            --success: #059669;
            --success-dark: #047857;
            --warning: #f59e0b;
            --error: #dc2626;
            --border: #d8d8d8;
            --text: #1f2937;
            --muted: #6b7280;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Inter, Arial, sans-serif;
            background: radial-gradient(circle at top, rgba(198, 40, 40, 0.07), transparent 35%), var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            /* background: linear-gradient(135deg, var(--primary), var(--primary-dark));*/
            background-color: black;
            color: white;
            padding: 24px 32px;
            box-shadow: 0 6px 18px rgba(23, 23, 23, 0.08);
            border-bottom: 5px solid #db641a;
        }

        .header-content {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: space-between;
            flex-wrap: wrap;
            width: 100%;
            padding: 0 12px;
        }

        .logo {
            height: 48px;
            width: auto;
            border-radius: 6px;
            object-fit: contain;
            flex: 0 0 auto;
        }

        header h1 {
            margin: 0;
            font-size: clamp(1.1rem, 3.5vw, 1.6rem);
            flex: 1 1 220px;
            min-width: 0;
            word-break: break-word;
        }

        @media (max-width: 640px) {
            .header-content {
                flex-direction: column;
                align-items: center;
                gap: 8px;
            }

            header h1 {
                text-align: center;
                font-size: 1.2rem;
            }
        }

        header h1 {
            margin: 0;
            font-size: 1.75rem;
            letter-spacing: -0.02em;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid rgba(15, 23, 42, 0.08);
        }

        .page-header h2 {
            margin: 0;
            font-size: 1.75rem;
            color: #111827;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 600;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .nav-link:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .table-wrapper {
            background: var(--surface);
            border: 1px solid rgba(15, 23, 42, 0.06);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 16px 50px rgba(15, 23, 42, 0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 16px 18px;
            text-align: left;
            border-bottom: 1px solid rgba(15, 23, 42, 0.08);
        }

        th {
            background: #f8f9fb;
            color: var(--text);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.85rem;
        }

        tbody tr:hover {
            background: rgba(198, 40, 40, 0.02);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .status-approved {
            background: rgba(5, 150, 105, 0.15);
            color: var(--success-dark);
        }

        .status-rejected {
            background: rgba(220, 38, 38, 0.15);
            color: #b91c1c;
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.15);
            color: #92400e;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--muted);
        }

        .search-section {
            margin-bottom: 20px;
        }

        #searchInput {
            width: 100%;
            max-width: 450px;
            padding: 14px 18px;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 15px;
            background: white;
            outline: none;
            transition: 0.2s;
        }

        #searchInput:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(198, 40, 40, 0.08);
        }

        @media (max-width: 960px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .page-header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }

            table {
                font-size: 0.9rem;
            }

            th,
            td {
                padding: 12px;
            }
        }

        @media (max-width: 640px) {
            header {
                padding: 20px 16px;
            }

            header h1 {
                font-size: 1.4rem;
            }

            .container {
                padding: 24px 16px;
            }

            .table-wrapper {
                border-radius: 16px;
                overflow-x: auto;
            }

            table {
                font-size: 0.85rem;
            }

            th,
            td {
                padding: 10px 8px;
            }

            .nav-link {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="header-content">
            <h1>Visitor Management System</h1>
        </div>
    </header>

    <div class="container">
        <div class="page-header">
            <h2>Visitor Logs</h2>
            <a href="/auth/dashboard" class="nav-link">← Back to Dashboard</a>
        </div>
        <div class="search-section">
            <input type="text" id="searchInput" placeholder=" Search visitor, phone or employee...">
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Meeting With</th>
                        <th>Status</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="visitorBody"></tbody>
            </table>
            <div id="emptyState" class="empty-state" style="display: none;">
                <p>No visitor logs found.</p>
            </div>
        </div>
    </div>

    <script>
        async function loadVisitorLogs() {
            try {
                const response = await fetch('/visitor/all', {
                    credentials: "include"
                });
                
                if (!response.ok) {
                    if (response.status === 401 || response.status === 403) {
                        window.location.href = '/employee-login.html';
                        return;
                    }
                    throw new Error('Failed to fetch logs');
                }

                const visitors = await response.json();
                const body = document.getElementById('visitorBody');
                const emptyState = document.getElementById('emptyState');

                if (!visitors || visitors.length === 0) {
                    body.innerHTML = '';
                    emptyState.style.display = 'block';
                    return;
                }

                emptyState.style.display = 'none';
                body.innerHTML = '';

                visitors.forEach(visitor => {
                    const statusClass = visitor.status === 'approved'
                        ? 'status-approved'
                        : visitor.status === 'rejected'
                            ? 'status-rejected'
                            : 'status-pending';

                    const row = document.createElement('tr');
                    row.classList.add('visitor-row');
                    row.innerHTML = `
                        <td><strong>${escapeHtml(visitor.name)}</strong></td>
                        <td>${escapeHtml(visitor.phone)}</td>
                        <td>${escapeHtml(visitor.employee_name || 'N/A')}</td>
                        <td><span class="status-badge ${statusClass}">${visitor.status}</span></td>
                        <td>${new Date(visitor.created_at).toLocaleString()}</td>
                    `;
                    body.appendChild(row);
                });
            } catch (error) {
                console.error('Error loading visitor logs:', error);
                document.getElementById('visitorBody').innerHTML = '<tr><td colspan="5" style="text-align: center; color: red;">Error loading logs. Please try again.</td></tr>';
            }
        }

        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
        function setupSearch() {

            const searchInput =
                document.getElementById('searchInput');

            searchInput.addEventListener('input', () => {

                const value =
                    searchInput.value.toLowerCase();

                const rows =
                    document.querySelectorAll('.visitor-row');

                rows.forEach(row => {

                    const text =
                        row.innerText.toLowerCase();

                    row.style.display =
                        text.includes(value)
                            ? ''
                            : 'none';
                });
            });
        }

        loadVisitorLogs();
        setupSearch();
    </script>
</body>

</html>
