<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Login - Visitor Management</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <header>
        <h1>Security Terminal</h1>
    </header>

    <div class="auth-container">
        <h2>Security Login</h2>
        
        <div id="error" class="message" style="color: #c62828; display: none; margin-bottom: 15px;"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required placeholder="Enter username" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter password" autocomplete="current-password">
            </div>
            <button type="submit" class="auth-btn">Verify Credentials</button>
        </form>
    </div>

    <script src="security-login.js"></script>
</body>
</html>
