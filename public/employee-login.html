<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <header>
        <h1>Employee Login</h1>
    </header>

    <div class="auth-container">
        <h2>Employee Login</h2>
        
        <div id="error" class="message" style="color: #c62828; display: none; margin-bottom: 15px;"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="Enter company email" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter password" autocomplete="current-password">
            </div>
            <button type="submit" class="auth-btn">Login</button>
            
            <div class="auth-footer">
                Don't have an account? <a href="employee-signup.html">Sign Up</a>
            </div>
        </form>
    </div>

    <script src="employee-login.js"></script>
</body>
</html>
