<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Signup</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <header>
        <h1>Employee Signup</h1>
    </header>

    <div class="auth-container">
        <h2>Create Employee Account</h2>
        
        <div id="error" class="message" style="color: #c62828; display: none; margin-bottom: 15px;"></div>

        <form id="signupForm">
            <div class="form-group">
                <label for="employeeId">Employee ID</label>
                <input type="number" id="employeeId" required placeholder="Enter employee ID">
            </div>
            <div class="form-group">
                <label for="email">Company Email</label>
                <input type="email" id="email" required placeholder="Enter company email" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter password" autocomplete="new-password">
            </div>
            <button type="submit" class="auth-btn">Create Account</button>
            
            <div class="auth-footer">
                Already have an account? <a href="employee-login.html">Login</a>
            </div>
        </form>
    </div>

    <script src="employee-signup.js"></script>
</body>
</html>
