<!DOCTYPE html>
<html>
<head>
    <title>Employee Signup</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<header>
    <h1>Employee Signup</h1>
</header>

<div class="auth-container">

    <h2>Create Employee Account</h2>

<form id="signupForm">

    <input
        type="number"
        id="employeeId"
        placeholder="Employee ID"
        required>

    <br><br>

    <input
        type="email"
        id="email"
        placeholder="Company Email"
        required>

    <br><br>

    <input
        type="password"
        id="password"
        placeholder="Password"
        required>

    <br><br>

    <button type="submit">
        Create Account
    </button>

</form>

<script src="employee-signup.js"></script>

</body>
</html>
