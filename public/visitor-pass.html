<!DOCTYPE html>
<html>

<head>
    <title>Visitor Pass</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Clean, professional visitor pass styles (no logos) */
        :root {
            --bg: #f6f8fa;
            --card: #ffffff;
            --muted: #6b7280;
            --accent: #1f6feb;
            --surface-shadow: 0 12px 30px rgba(16, 24, 40, 0.06);
            --radius: 14px;
            --max-width: 760px;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            background: var(--bg);
            color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px;
        }

        .pass-card {
            width: 100%;
            max-width: var(--max-width);
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--surface-shadow);
            display: grid;
            grid-template-columns: 1fr 300px;
            overflow: hidden;
        }

        .pass-main {
            padding: 28px 32px;
        }

        .pass-title {
            margin: 0 0 6px 0;
            font-size: 20px;
            letter-spacing: -0.2px;
        }

        .pass-sub {
            margin: 0 0 18px 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .details {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px
        }

        .detail {
            display: flex;
            gap: 12px;
            align-items: flex-start
        }

        .detail .label {
            width: 140px;
            color: var(--muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.06em
        }

        .detail .value {
            font-weight: 600;
            font-size: 1rem
        }

        .pass-side {
            background: linear-gradient(180deg, #fbfdff 0%, #ffffff 100%);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            justify-content: flex-start
        }

        .photo-wrap {
            width: 180px;
            height: 180px;
            border-radius: 12px;
            overflow: hidden;
            background: #eef2ff;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .photo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block
        }

        .qr {
            width: 180px;
            height: 180px;
            border-radius: 10px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(15, 23, 42, 0.04)
        }

        .qr img {
            max-width: 100%;
            height: auto;
            display: block
        }

        .status-pill {
            padding: 8px 12px;
            border-radius: 999px;
            font-weight: 700;
            color: var(--accent);
            border: 1px solid rgba(31, 111, 235, 0.12)
        }

        .print-button {
            margin-top: 8px;
            padding: 10px 14px;
            border-radius: 10px;
            border: none;
            background: #0f172a;
            color: #fff;
            cursor: pointer
        }

        @media (max-width:880px) {
            .pass-card {
                grid-template-columns: 1fr;
                max-width: 520px
            }

            .pass-side {
                flex-direction: row;
                justify-content: space-between;
                padding: 16px
            }

            .photo-wrap,
            .qr {
                width: 120px;
                height: 120px
            }
        }

        @media print {
            body {
                padding: 0;
                background: #fff
            }

            .pass-card {
                box-shadow: none
            }

            .print-button {
                display: none
            }
        }
    </style>
</head>

<body>

    <div class="pass-card">
        <div class="pass-main">
            <h2 class="pass-title">Visitor Pass</h2>
            <p class="pass-sub">Please carry this pass during your visit. Present it when requested.</p>

            <div class="details">
                <div class="detail">
                    <div class="label">Name</div>
                    <div class="value" id="name">&nbsp;</div>
                </div>
                <div class="detail">
                    <div class="label">Phone</div>
                    <div class="value" id="phone">&nbsp;</div>
                </div>
                <div class="detail">
                    <div class="label">Document</div>
                    <div class="value" id="documentNumber">&nbsp;</div>
                </div>
                <div class="detail">
                    <div class="label">Document Type</div>
                    <div class="value" id="documentType">&nbsp;</div>
                </div>
                <div class="detail">
                    <div class="label">Meeting With</div>
                    <div class="value" id="employee">&nbsp;</div>
                </div>
                <div class="detail">
                    <div class="label">Status</div>
                    <div class="value" id="status">&nbsp;</div>
                </div>
                <div class="detail">
                    <div class="label">Pass ID</div>
                    <div class="value" id="passid">&nbsp;</div>
                </div>
            </div>
        </div>

        <aside class="pass-side">
            <div class="photo-wrap">
                <img id="visitorPhoto" src="/images/placeholder-person.png" alt="visitor photo">
            </div>

            <div class="qr">
                <img id="qr" src="" alt="qr code">
            </div>

            <div style="width:100%;display:flex;flex-direction:column;align-items:center;gap:10px">
                <div id="statusPill" class="status-pill">&nbsp;</div>
                <button class="print-button" onclick="window.print()">Print Pass</button>
            </div>
        </aside>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const token = params.get('token');

        async function loadPass() {
            try {
                const resp = await fetch(`/visitor/pass/${id}?token=${token}`);
                if (!resp.ok) {
                    document.body.innerHTML = `
                        <div style="max-width: 500px; margin: 100px auto; padding: 40px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; font-family: Arial, sans-serif;">
                            <h1 style="color: #dc2626; font-size: 2.5rem; margin-bottom: 20px;">Access Denied</h1>
                            <p style="color: #4b5563; font-size: 1.1rem; line-height: 1.6;">
                                You do not have permission to access this visitor pass. The URL may be invalid or expired.
                            </p>
                        </div>
                    `;
                    return;
                }
                const visitor = await resp.json();

                document.getElementById('name').innerText = visitor.name || '';
                document.getElementById('phone').innerText = visitor.phone || '';
                document.getElementById('documentNumber').innerText = visitor.document_number || '';
                document.getElementById('documentType').innerText = visitor.document_type || '';
                document.getElementById('employee').innerText = visitor.employee_name || 'Not assigned';
                document.getElementById('passid').innerText = visitor.pass_id || '';

                const statusEl = document.getElementById('status');
                const pill = document.getElementById('statusPill');
                const status = (visitor.status || '').toLowerCase();
                statusEl.innerText = status ? status.charAt(0).toUpperCase() + status.slice(1) : '';
                pill.innerText = statusEl.innerText;

                // style pill color for common statuses
                pill.style.color = status === 'approved' ? '#065f46' : status === 'rejected' ? '#881337' : 'var(--accent)';

                // QR
                if (visitor.qr_code) document.getElementById('qr').src = visitor.qr_code;

                // photo path normalization
                // photo from database (Base64)
                if (visitor.photo_path) {
                    document.getElementById('visitorPhoto').src = `/visitor/secure-file/photo/${id}?token=${token}`;
                }
            } catch (err) {
                console.error('Error loading pass', err);
            }
        }

        loadPass();
    </script>

</body>

</html>
