<!DOCTYPE html>
<html>
<head>
    <title>Visitor Pass</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            display: flex;
            justify-content: center;
            padding: 30px;
            color: #333;
        }

        .pass-card {
            width: 500px;
            border: 2px solid #212529;
            padding: 24px;
            border-radius: 16px;
            background: #fff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        .pass-card h1 {
            margin-top: 0;
            margin-bottom: 18px;
            font-size: 26px;
            letter-spacing: 0.5px;
        }

        .pass-row {
            margin-bottom: 14px;
            line-height: 1.5;
        }

        .pass-row b {
            width: 130px;
            display: inline-block;
        }

        .approved {
            color: green;
            font-weight: bold;
        }

        .rejected {
            color: #c82333;
            font-weight: bold;
        }

        .pending {
            color: #fd7e14;
            font-weight: bold;
        }

        .qr-block {
            text-align: center;
            margin-top: 22px;
        }

        .print-button {
            display: inline-block;
            margin-top: 24px;
            padding: 10px 18px;
            background: #212529;
            border: none;
            color: white;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="pass-card">
        <h1>Visitor Pass</h1>

        <div class="pass-row"><b>Name:</b> <span id="name"></span></div>
        <div class="pass-row"><b>Phone:</b> <span id="phone"></span></div>
        <div class="pass-row"><b>Aadhaar:</b> <span id="aadhaar"></span></div>
        <div class="pass-row"><b>Meeting With:</b> <span id="employee"></span></div>
        <div class="pass-row"><b>Status:</b> <span id="status"></span></div>
        <div class="pass-row"><b>Pass ID:</b> <span id="passid"></span></div>

        <div class="qr-block">
            <img id="qr" width="250">
        </div>

        <button class="print-button" onclick="window.print()">
            Print Pass
        </button>
    </div>

<script>

const params =
    new URLSearchParams(
        window.location.search
    );

const id =
    params.get('id');

async function loadPass() {

    const response =
        await fetch(
            `http://localhost:3000/visitor/pass/${id}`
        );

    const visitor =
        await response.json();

    document.getElementById('name')
        .innerText = visitor.name;

    document.getElementById('phone')
        .innerText = visitor.phone;

    document.getElementById('aadhaar')
        .innerText = visitor.aadhaar_number;

    document.getElementById('employee')
        .innerText = visitor.employee_name || 'Not assigned';

    const statusEl = document.getElementById('status');
    statusEl.innerText = visitor.status;
    statusEl.className = visitor.status === 'approved'
        ? 'approved'
        : visitor.status === 'rejected'
            ? 'rejected'
            : 'pending';

    document.getElementById('passid')
        .innerText = visitor.pass_id;

    document.getElementById('qr')
        .src = visitor.qr_code;
}

loadPass();

</script>

</body>
</html>
