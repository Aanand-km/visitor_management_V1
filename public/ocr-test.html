<!DOCTYPE html>
<html>

<head>
    <title>OCR Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f5f7;
            color: #1f2937;
            min-height: 100vh;
            padding: 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            margin: 0 0 20px;
            font-size: 1.8rem;
            text-align: center;
        }

        input,
        button,
        pre {
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
        }

        input {
            padding: 12px 14px;
            border: 1px solid #c8cbd3;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        button {
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            background: #db641a;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 18px;
        }

        pre {
            background: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 16px;
            padding: 16px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        @media (max-width: 480px) {
            body {
                padding: 16px;
            }

            h2 {
                font-size: 1.5rem;
            }

            button,
            input,
            pre {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>

    <h2>OCR Test</h2>

    <input type="file" id="document" />

    <button onclick="uploadFile()">
        Read Text
    </button>

    <pre id="result"></pre>

    <script>

        async function uploadFile() {

            const file =
                document
                    .getElementById('document')
                    .files[0];

            const formData =
                new FormData();

            formData.append(
                'document',
                file
            );

            const response =
                await fetch(
                    '/ocr/upload',
                    {
                        method: 'POST',
                        body: formData
                    }
                );

            const data =
                await response.json();

            document
                .getElementById('result')
                .innerText =

                `
Mobile: ${data.mobile}

Aadhaar: ${data.aadhaar}

--------------------

${data.text}
`;
        }

    </script>

</body>

</html>
